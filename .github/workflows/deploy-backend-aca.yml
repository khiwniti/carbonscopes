name: Deploy Backend to Azure Container Apps

# Automatically builds the backend Docker image, pushes it to Azure Container
# Registry, and updates the Azure Container App that serves production traffic
# at https://carbonscope-backend.wittybay-b8ab90d4.eastus.azurecontainerapps.io
#
# Required secrets (already present from deploy-frontend-acr.yml):
#   AZURE_CREDENTIALS  – JSON service-principal with push rights to carbonscopeacr
#                        and Contributor on carbonscope-rg

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-aca.yml'
  workflow_dispatch:   # allow manual redeploys from the Actions UI

env:
  ACR_NAME: carbonscopeacr
  RESOURCE_GROUP: carbonscope-rg
  CONTAINER_APP_NAME: carbonscope-backend
  IMAGE_NAME: backend

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Build and push backend image
        run: |
          IMAGE_LATEST="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:latest"
          IMAGE_SHA="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"

          echo "Building production backend image..."
          docker build \
            -f backend/Dockerfile.production \
            -t "$IMAGE_LATEST" \
            -t "$IMAGE_SHA" \
            ./backend

          echo "Pushing images..."
          docker push "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"

          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV

      - name: Deploy to Azure Container Apps
        run: |
          echo "Deploying $IMAGE_SHA to Container App $CONTAINER_APP_NAME..."
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_SHA"

          echo "Checking container app status..."
          az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "{Name:name,ProvisioningState:properties.provisioningState,RunningStatus:properties.runningStatus}" \
            --output table

      - name: Verify deployment (health check)
        run: |
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Backend FQDN: $FQDN"
          echo "Waiting 30s for the new revision to start..."
          sleep 30

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${FQDN}/health" --max-time 30 || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️  Health check returned HTTP $HTTP_STATUS — deployment may still be starting up"
            echo "    Check https://${FQDN}/health manually once the container is fully ready"
          fi
