name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-frontend-cloudflare-pages.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend with @cloudflare/next-on-pages
        working-directory: ./apps/frontend
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://carbonscope.ensimu.space' }}
          NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://carbonscope.ensimu.space' }}
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL || 'https://api.carbonscope.ensimu.space/v1' }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.carbonscope.ensimu.space/v1' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ENV_MODE: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'carbonscope-frontend' }}
          workingDirectory: ./apps/frontend

      - name: Deployment summary
        run: |
          echo "Frontend deployed to Cloudflare Pages."
          echo "Project: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'carbonscope-frontend' }}"
