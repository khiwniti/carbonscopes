name: Deploy Backend to Cloudflare Containers

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'cloudflare-container/**'
      - '.github/workflows/deploy-backend-cloudflare.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/carbonscopes-backend

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Lint & basic checks ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lint backend
        working-directory: ./backend
        run: |
          uv pip install --system ruff
          ruff check .

      # ---- Docker build & push ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.cloudflare
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Deploy Worker + Container to Cloudflare ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: ./cloudflare-container
        run: npm ci

      - name: Deploy to Cloudflare Containers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: ./cloudflare-container

      - name: Verify deployment
        run: |
          echo "Waiting 30s for deployment to propagate..."
          sleep 30
          echo "Backend deployment completed successfully."
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
