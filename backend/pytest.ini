[pytest]
# Pytest configuration for BKS cBIM AI backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    --verbose
    --strict-markers
    --disable-warnings
    -ra
    --tb=short

# Markers for test categorization
markers =
    large_context: Tests with large token contexts (200k+)
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use databases, services)
    slow: Slow tests (may take >1s)
    requires_graphdb: Tests requiring GraphDB connection
    requires_redis: Tests requiring Redis connection
    requires_db: Tests requiring PostgreSQL connection
    requires_api_keys: Tests requiring external API keys

# Environment variables for testing
env =
    ENV_MODE=test
    TESTING=true

# Asyncio configuration
asyncio_mode = auto

# Coverage options (if pytest-cov is installed)
# Uncomment when ready for coverage analysis
# --cov=core
# --cov=agents
# --cov=api
# --cov-report=html
# --cov-report=term-missing
