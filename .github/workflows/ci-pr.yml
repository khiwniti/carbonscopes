name: CI - Pull Request

on:
  pull_request:
    branches:
      - main
      - staging
      - PRODUCTION
  workflow_dispatch:

jobs:
  # ===========================================================================
  # LINT & TYPE CHECK
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend code
        run: npm run lint || true

      - name: Type check frontend
        run: npm run typecheck || true

      - name: Setup Python
        if: hashFiles('backend/pyproject.toml')
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        if: hashFiles('backend/pyproject.toml')
        working-directory: ./backend
        run: |
          pip install -e . || pip install -r requirements.txt || true

      - name: Type check backend
        if: hashFiles('backend/pyproject.toml')
        working-directory: ./backend
        run: |
          pip install mypy || true
          mypy . --ignore-missing-imports || true

  # ===========================================================================
  # UNIT TESTS
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:unit -- --passWithNoTests || true

      - name: Setup Python
        if: hashFiles('backend/tests/')
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backend unit tests
        if: hashFiles('backend/tests/')
        working-directory: ./backend
        run: |
          pip install pytest pytest-cov || true
          pytest tests/ -v --tb=short --ignore=tests/api/ --ignore=tests/e2e/ || true

  # ===========================================================================
  # SECURITY SCAN
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Run GitHub Dependency Scan
        uses: actions/dependency-review-action@v3

  # ===========================================================================
  # BUILD VERIFICATION
  # ===========================================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build || npm run next build || true

      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Frontend build successful"
            ls -la .next/
          fi