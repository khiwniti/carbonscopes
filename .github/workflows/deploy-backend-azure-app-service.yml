name: Deploy Backend to Azure App Service

# Deploys the backend to Azure App Service using zip deployment
# Triggered on push to main branch for backend changes

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-azure-app-service.yml'
  workflow_dispatch:   # allow manual redeploys from the Actions UI

env:
  AZURE_APP_NAME: carbonscope-backend-app  # Update this with your actual App Service name
  AZURE_RESOURCE_GROUP: carbonscope-rg
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install UV package manager
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "/root/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: ./backend
        run: |
          # Install dependencies using UV (faster than pip)
          if [ -f "uv.lock" ]; then
            echo "uv.lock found, installing with uv sync"
            uv sync --frozen --no-dev
          else
            echo "uv.lock not found, installing from requirements.txt or pyproject.toml"
            if [ -f "requirements.txt" ]; then
              uv pip install -r requirements.txt
            elif [ -f "pyproject.toml" ]; then
              uv pip install .
            else
              echo "No requirements.txt or pyproject.toml found"
              exit 1
            fi
          fi

      - name: Create deployment package
        working-directory: ./backend
        run: |
          # Create a zip file for Azure App Service deployment
          # Include all necessary files but exclude unnecessary ones
          zip -r ../backend-deploy.zip . \
            -x "*.git*" \
            -x "*/__pycache__/*" \
            -x "*/.pytest_cache/*" \
            -x ".venv/*" \
            -x "*.pyc" \
            -x ".env*" \
            -x "docker*" \
            -x "Dockerfile*" \
            -x "docs/*" \
            -x "tests/*" \
            -x "*.md"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          package: backend-deploy.zip
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}

      - name: Validate deployment
        run: |
          # Wait for app to start
          sleep 15
          
          # Get the app URL
          APP_URL="https://${{ env.AZURE_APP_NAME }}.azurewebsites.net"
          echo "App URL: $APP_URL"
          
          # Try health check with retries
          MAX_ATTEMPTS=5
          ATTEMPT=1
          STATUS_CODE=000
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ $STATUS_CODE -ne 200 ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS: Checking health endpoint..."
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" --max-time 10 || echo "000")
            
            if [ $STATUS_CODE -ne 200 ]; then
              echo "Health check returned HTTP $STATUS_CODE. Waiting 10 seconds before retry..."
              sleep 10
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          
          if [ $STATUS_CODE -eq 200 ]; then
            echo "✅ Health check passed (HTTP $STATUS_CODE)"
          else
            echo "❌ Health check failed after $MAX_ATTEMPTS attempts. Final status: HTTP $STATUS_CODE"
            echo "Deployment may have failed or app is not responding"
            exit 1
          fi
          
          # Azure CLI check for webapp state
          echo "Checking Azure App Service state..."
          STATE=$(az webapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query state -o tsv)
          if [ "$STATE" != "Running" ]; then
            echo "Azure CLI check failed: App Service is in '$STATE' state, expected 'Running'"
            exit 1
          fi
          echo "Azure CLI check passed: App Service is in Running state"