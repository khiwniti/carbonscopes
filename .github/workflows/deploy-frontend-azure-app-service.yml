name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-frontend-azure-app-service.yml'
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AZURE_APP_NAME: suna-frontend-app
  AZURE_RESOURCE_GROUP: carbonscope-rg
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.deployment_environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd apps/frontend
          pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_ENV_MODE: production

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          package: apps/frontend/.next/standalone
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_FRONTEND }}

      - name: Validate deployment
        run: |
          sleep 10
          # Application-level health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_APP_NAME }}.azurewebsites.net/api/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Application health check failed with status: $STATUS"
            exit 1
          fi
          echo "Application health check passed!"
          
          # Azure CLI check for webapp state
          echo "Checking Azure App Service state..."
          STATE=$(az webapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query state -o tsv)
          if [ "$STATE" != "Running" ]; then
            echo "Azure CLI check failed: App Service is in '$STATE' state, expected 'Running'"
            exit 1
          fi
          echo "Azure CLI check passed: App Service is in Running state"
          echo "Deployment successful!"

      - name: Post deployment notification
        if: success()
        run: |
          echo "✅ Frontend deployed successfully to ${{ env.AZURE_APP_NAME }}.azurewebsites.net"
          echo "Deployment timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Frontend deployment failed"
          exit 1
